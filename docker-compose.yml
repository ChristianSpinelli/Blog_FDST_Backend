version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=c.spin
      - POSTGRES_PASSWORD=blog123
      - POSTGRES_DB=blog
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: